name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint-build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci

      - name: Install API dependencies
        working-directory: services/compiler
        run: npm ci

      - name: Build all packages
        run: npm run build

      - name: Check TypeScript (API)
        working-directory: services/compiler
        run: npx tsc --noEmit

      - name: Run tests
        run: npm test

      - name: Smoke test
        run: node smoke-spa.mjs

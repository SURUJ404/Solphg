name: Secrets

on:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Use secret
        run: echo "Deploying with secrets configured"

      - name: Deploy to Railway
        working-directory: services/compiler
        run: |
          mkdir -p .railway
          cat > .railway/railway.ts << EOM
          export default { project: "${{ secrets.RAILWAY_PROJECT_ID }}" } as const
          EOM
          cat .railway/railway.ts
          npx railway up --detach --yes 2>&1
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}

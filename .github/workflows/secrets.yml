name: Secrets

on:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Use secret
        run: echo "Deploying with secrets configured"

      - name: Create Railway config
        working-directory: services/compiler
        run: |
          mkdir -p .railway
          echo '{"projectId":"${{ secrets.RAILWAY_PROJECT_ID }}"}' > .railway/railway.json

      - name: Deploy to Railway
        working-directory: services/compiler
        run: npx railway up --service compiler-api --detach --yes
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}
